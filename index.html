    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("year").textContent = new Date().getFullYear();

        fetch("https://events.vercount.one/api/v2/log", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: "https://www.prashantgiri360.com.np/" }),
          keepalive: true
        }).then(res => res.json()).then(data => {
          if (data.data && data.data.site_uv !== undefined) {
            document.getElementById("visitor-count").textContent = data.data.site_uv;
          }
        }).catch(() => {
          document.getElementById("visitor-count").textContent = "";
        });

        const themeBtn = document.getElementById("theme-toggle-button");
        const html = document.documentElement;
        const applyTheme = (theme) => {
          html.classList.toggle("light-mode", theme === "light");
          const lightMeta = document.querySelector('meta[media="(prefers-color-scheme: light)"]');
          const darkMeta = document.querySelector('meta[media="(prefers-color-scheme: dark)"]');
          const metaColor = document.querySelector('meta[name="theme-color"]');
          if (lightMeta && darkMeta && metaColor) {
            metaColor.setAttribute("content", theme === "light" ? lightMeta.content : darkMeta.content);
          }
        };
        const saved = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        let currentTheme = saved || (prefersDark ? "dark" : "light");
        applyTheme(currentTheme);
        themeBtn.addEventListener("click", () => {
          currentTheme = html.classList.contains("light-mode") ? "dark" : "light";
          applyTheme(currentTheme);
          localStorage.setItem("theme", currentTheme);
        });

        document.querySelectorAll(".link-section").forEach(section => {
          section.querySelectorAll(".nav-item").forEach((item, i) => {
            item.style.animationDelay = `${1 + i * 0.08}s`;
          });
        });

        const canvas = document.getElementById("particle-canvas");
        const ctx = canvas.getContext("2d");
        let particles = [], w, h;
        const mouse = { x: null, y: null, radius: 100 };

        const resize = () => {
          w = canvas.width = window.innerWidth;
          h = canvas.height = window.innerHeight;
          mouse.radius = Math.min(w, h) / 7.5;
          init();
        };
        window.addEventListener("resize", resize);
        window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener("mouseout", () => { mouse.x = mouse.y = null; });

        canvas.addEventListener("click", e => {
          const px = e.clientX, py = e.clientY, r = mouse.radius * 1.7;
          particles.forEach(p => {
            const d = Math.hypot(px - p.x, py - p.y);
            if (d < r) {
              const a = Math.atan2(py - p.y, px - p.x), f = (1 - d / r) * 0.8;
              p.vx += Math.cos(a) * f * 5;
              p.vy += Math.sin(a) * f * 5;
              p.pulse = 0.85;
            }
          });
        });

        class Particle {
          constructor() {
            this.x = Math.random() * w;
            this.y = Math.random() * h;
            this.size = Math.random() * 2.8 + 1.2;
            this.baseSize = this.size;
            this.vx = (Math.random() - 0.5) * 0.8;
            this.vy = (Math.random() - 0.5) * 0.8;
            this.baseHue = 270;
            this.baseSat = 80;
            this.baseLight = 78;
            this.baseAlpha = Math.random() * 0.6 + 0.3;
            this.alpha = this.baseAlpha;
            this.lightness = this.baseLight;
            this.pulse = 0;
            this.floatOffset = Math.random() * Math.PI * 2;
            this.floatSpeed = Math.random() * 0.004 + 0.002;
            this.floating = Math.random() < 0.006;
          }
          update() {
            this.floatOffset += this.floatSpeed;
            let dx = mouse.x - this.x, dy = mouse.y - this.y;
            let dist = mouse.x === null ? Infinity : Math.hypot(dx, dy);
            let tSize = this.baseSize, tAlpha = this.baseAlpha, tLight = this.baseLight, fx = 0, fy = 0;
            const floatX = this.floating ? Math.sin(this.floatOffset) * 0.12 : 0;
            const floatY = this.floating ? Math.cos(this.floatOffset * 0.7) * 0.12 : 0;

            if (dist < mouse.radius) {
              const prox = 1 - dist / mouse.radius;
              tSize = this.baseSize + prox * 3.5;
              tAlpha = Math.min(this.baseAlpha + prox * 0.7, 0.98);
              tLight = Math.min(this.baseLight + prox * 20, 95);
              const angle = Math.atan2(dy, dx);
              fx = -Math.cos(angle) * prox * 0.05;
              fy = -Math.sin(angle) * prox * 0.05;
            }
            if (this.pulse > 0) {
              tSize += this.pulse * 6;
              tAlpha = Math.min(tAlpha + this.pulse * 0.8, 1);
              tLight = Math.min(tLight + this.pulse * 25, 98);
              this.pulse -= 0.03;
              if (this.pulse < 0) this.pulse = 0;
            }
            this.size += (tSize - this.size) * 0.12;
            this.alpha += (tAlpha - this.alpha) * 0.12;
            this.lightness += (tLight - this.lightness) * 0.12;
            this.vx += fx; this.vy += fy;
            this.vx *= 0.965; this.vy *= 0.965;
            this.x += this.vx + floatX; this.y += this.vy + floatY;
            if (this.x < -this.size) this.x = w + this.size;
            else if (this.x > w + this.size) this.x = -this.size;
            if (this.y < -this.size) this.y = h + this.size;
            else if (this.y > h + this.size) this.y = -this.size;
          }
          draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, Math.max(0, this.size), 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${this.baseHue}, ${this.baseSat}%, ${this.lightness}%, ${this.alpha})`;
            ctx.fill();
          }
        }

        function init() {
          particles = [];
          const count = Math.max(70, Math.min(300, Math.floor((w * h) / 19e3)));
          for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        function connect() {
          ctx.lineWidth = 0.8;
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const d = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
              if (d < 120) {
                const op = (1 - d / 120) * Math.min(particles[i].alpha, particles[j].alpha) * 0.8;
                if (op > 0.04) {
                  ctx.strokeStyle = `hsla(${particles[i].baseHue}, ${particles[i].baseSat}%, ${(particles[i].lightness + particles[j].lightness) / 2 + 2}%, ${op})`;
                  ctx.beginPath();
                  ctx.moveTo(particles[i].x, particles[i].y);
                  ctx.lineTo(particles[j].x, particles[j].y);
                  ctx.stroke();
                }
              }
            }
            if (mouse.x !== null) {
              const d = Math.hypot(particles[i].x - mouse.x, particles[i].y - mouse.y);
              if (d < mouse.radius * 1.5) {
                const op = (1 - d / (mouse.radius * 1.5)) * particles[i].alpha;
                if (op > 0.07) {
                  ctx.lineWidth = 1;
                  ctx.strokeStyle = `hsla(${particles[i].baseHue}, ${particles[i].baseSat + 12}%, ${particles[i].lightness + 8}%, ${op})`;
                  ctx.beginPath();
                  ctx.moveTo(particles[i].x, particles[i].y);
                  ctx.lineTo(mouse.x, mouse.y);
                  ctx.stroke();
                  ctx.lineWidth = 0.8;
                }
              }
            }
          }
        }

        function animate() {
          ctx.clearRect(0, 0, w, h);
          particles.forEach(p => { p.update(); p.draw(); });
          connect();
          requestAnimationFrame(animate);
        }

        resize();
        animate();
      });
    </script>
  </body>
</html>
